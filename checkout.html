<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Checkout - FarmFresh</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav>
    <a class="logo" href="index.html">FarmFresh</a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li>
        <a href="cart.html">
          Cart
          <span class="nav-cart-count" id="cart-count">0</span>
        </a>
      </li>
      <li><a href="checkout.html">Checkout</a></li>
    </ul>
  </nav>

  <div class="container">
    <h2>Checkout</h2>
    <div id="checkout-area"></div>
  </div>

  <footer>
    <div class="footer-inner">
      <div class="footer-col">
        <h4>FarmFresh</h4>
        <p>Fresh organic grocery delivered to your doorstep.</p>
      </div>
      <div class="footer-col">
        <h4>Quick Links</h4>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
        <a href="checkout.html">Checkout</a>
      </div>
      <div class="footer-col">
        <h4>Contact</h4>
        <p>farmfresh@gmail.com</p>
        <p>+91 98765 43210</p>
        <p>VIT Vellore, Tamil Nadu</p>
      </div>
    </div>
    <div class="footer-bottom">
      &copy; 2026 FarmFresh Shashwat - 24BCE2409
    </div>
  </footer>

  <script src="script.js"></script>
  
  <script>
    // Set the initial cart count on page load
    document.getElementById("cart-count").textContent = getCartCount();

    // Retrieve current items from local storage/script.js
    var cart = getCart();
    var area = document.getElementById("checkout-area");

    // Check if the user is trying to checkout with an empty cart
    if (cart.length === 0) {
      area.innerHTML =
        '<p>No items in cart.</p><a href="products.html">Shop now.</a>';
    } else {
      // 1. CALCULATE TOTALS
      var itemsTotal = 0;
      for (var i = 0; i < cart.length; i++) {
        itemsTotal += cart[i].price * cart[i].qty;
      }
      
      // Delivery Logic: Free for orders Rs. 200 and above, else Rs. 40
      var delivery = itemsTotal >= 200 ? 0 : 40;
      var grandTotal = itemsTotal + delivery;

      // 2. GENERATE ITEM LIST FOR SUMMARY
      var summaryItems = "";
      for (var j = 0; j < cart.length; j++) {
        summaryItems +=
          "<p>" +
          cart[j].name +
          " x " +
          cart[j].qty +
          " — Rs. " +
          cart[j].price * cart[j].qty +
          "</p>";
      }

      // 3. INJECT CHECKOUT FORM AND ORDER SUMMARY
      area.innerHTML =
        '<div class="checkout-layout">' +
        '<form id="order-form">' +
        "<label>Full Name</label>" +
        '<input type="text" id="name" placeholder="Enter your name" required />' +
        "<label>Phone Number</label>" +
        '<input type="tel" id="phone" placeholder="Enter phone number" required />' +
        "<label>Delivery Address</label>" +
        '<input type="text" id="address" placeholder="Enter delivery address" required />' +
        "<label>Delivery Slot</label>" +
        '<select id="slot">' +
        "<option>Morning 7am - 10am</option>" +
        "<option>Afternoon 12pm - 3pm</option>" +
        "<option>Evening 5pm - 8pm</option>" +
        "</select>" +
        "<label>Payment Method</label>" +
        '<select id="payment" onchange="showPaymentInfo()">' +
        '<option value="Cash on Delivery">Cash on Delivery</option>' +
        '<option value="UPI">UPI</option>' +
        '<option value="Net Banking">Net Banking</option>' +
        "</select>" +
        // UPI QR section (hidden by default)
        '<div class="upi-box" id="upi-box">' +
        "<p><strong>Scan QR to Pay</strong></p>" +
        '<img src="images/qr.jpg" alt="UPI QR Code" />' +
        "<p>UPI ID: <strong>farmfresh@upi</strong></p>" +
        '<p>Amount to pay: <strong style="color:#e65100;">Rs. ' +
        grandTotal +
        "</strong></p>" +
        "</div>" +
        '<button type="submit" class="btn-purple" style="width:100%;padding:10px;">Place Order</button>' +
        "</form>" +
        "</div>" +
        '<div class="order-summary-box">' +
        "<h3>Order Summary</h3>" +
        summaryItems +
        "<p>Delivery: " +
        (delivery === 0 ? "FREE" : "Rs. " + delivery) +
        "</p>" +
        '<p class="summary-total">Grand Total: Rs. ' +
        grandTotal +
        "</p>" +
        "</div>";

      // 4. ORDER SUBMISSION LOGIC
      document
        .getElementById("order-form")
        .addEventListener("submit", function (e) {
          e.preventDefault(); // Prevent page reload
          
          // Get form values
          var name = document.getElementById("name").value;
          var phone = document.getElementById("phone").value;
          var address = document.getElementById("address").value;
          var slot = document.getElementById("slot").value;
          var payment = document.getElementById("payment").value;

          // Clear cart data after successful order
          clearCart();
          document.getElementById("cart-count").textContent = 0;

          // Alert user and display the success summary
          alert(
            "Order Placed Successfully!\n\nName: " +
              name +
              "\nAddress: " +
              address +
              "\nSlot: " +
              slot +
              "\nPayment: " +
              payment +
              "\nTotal: Rs. " +
              grandTotal
          );

          // Replace form with Order Confirmation message
          area.innerHTML =
            '<div class="success-box">' +
            "<h2>Order Placed Successfully!</h2>" +
            "<p><strong>Name:</strong> " + name + "</p>" +
            "<p><strong>Phone:</strong> " + phone + "</p>" +
            "<p><strong>Address:</strong> " + address + "</p>" +
            "<p><strong>Delivery Slot:</strong> " + slot + "</p>" +
            "<p><strong>Payment:</strong> " + payment + "</p>" +
            "<p><strong>Items Total:</strong> Rs. " + itemsTotal + "</p>" +
            "<p><strong>Delivery:</strong> " + (delivery === 0 ? "FREE" : "Rs. " + delivery) + "</p>" +
            "<p><strong>Grand Total Paid:</strong> Rs. " + grandTotal + "</p>" +
            "<br>" +
            "<p>Your order will be delivered in the slot: <strong>" + slot + "</strong>.</p>" +
            "<br>" +
            '<a href="index.html"><button class="btn-orange">Back to Home</button></a>' +
            '<a href="products.html"><button class="btn-blue" style="margin-left:10px;">Shop More</button></a>' +
            "</div>";
        });
    }

    /**
     * Toggles the visibility of the UPI QR Code section
     * based on the selected payment method.
     */
    function showPaymentInfo() {
      var payment = document.getElementById("payment").value;
      var upiBox = document.getElementById("upi-box");
      if (payment === "UPI") {
        upiBox.style.display = "block";
      } else {
        upiBox.style.display = "none";
      }
    }
  </script>
</body>
</html>
